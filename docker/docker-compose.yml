services:
  mysql:
    image: mysql:8.0
    container_name: myrpa-mysql
    restart: unless-stopped
    ports:
      - "23306:3306"
    environment:
      MYSQL_ROOT_PASSWORD: myrpa_root_P@ss2024
      MYSQL_DATABASE: myrpa
      MYSQL_USER: myrpa
      MYSQL_PASSWORD: myrpa_db_P@ss2024
      TZ: Asia/Shanghai
    volumes:
      - ./mysql_data:/var/lib/mysql
    command: >
      --character-set-server=utf8mb4
      --collation-server=utf8mb4_unicode_ci
      --default-authentication-plugin=mysql_native_password
      --max-connections=500
      --innodb-buffer-pool-size=256M
      --slow-query-log=1
      --long-query-time=2
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-pmyrpa_root_P@ss2024"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    networks:
      - myrpa-network

  server:
    build:
      context: ../server
      dockerfile: Dockerfile
    container_name: myrpa-server
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      NODE_ENV: production
      SERVER_PORT: 3000
      DB_HOST: mysql
      DB_PORT: 3306
      DB_USER: myrpa
      DB_PASSWORD: myrpa_db_P@ss2024
      DB_DATABASE: myrpa
      JWT_SECRET: myrpa_jwt_s3cret_k3y_pr0duct10n_2024
      JWT_EXPIRES_IN: 7d
      JWT_REFRESH_EXPIRES_IN: 30d
      WS_HEARTBEAT_INTERVAL: 30000
      WS_HEARTBEAT_TIMEOUT: 35000
      LOG_LEVEL: info
      LOG_DIR: /app/logs
    volumes:
      - server_logs:/app/logs
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - myrpa-network

  admin:
    build:
      context: ../admin
      dockerfile: Dockerfile
    container_name: myrpa-admin
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - server
    networks:
      - myrpa-network

volumes:
  server_logs:
    driver: local

networks:
  myrpa-network:
    driver: bridge
